<form class="task-form" [formGroup]="taskForm" (ngSubmit)="submit()">
  <div class="form-grid">
    <label>
      <span>Title</span>
      <input type="text" formControlName="title" maxlength="200" placeholder="Add a task">
    </label>

    <label>
      <span>Due date</span>
      <input type="date" formControlName="due_date">
    </label>

    <label>
      <span>Priority</span>
      <select formControlName="priority">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </label>
  </div>

  <label>
    <span>Description</span>
    <textarea formControlName="description" rows="3" placeholder="Optional details"></textarea>
  </label>

  <p class="field-error" *ngIf="taskForm.controls.title.touched && taskForm.controls.title.invalid">
    Title is required.
  </p>

  <p class="form-error" *ngIf="error">{{ error }}</p>

  <button type="submit" [disabled]="saving">
    {{ saving ? 'Saving...' : 'Add Task' }}
  </button>
</form>
